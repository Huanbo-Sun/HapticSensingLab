<script>
    var audio = document.getElementById('backgroundMusic_Research');
    var playPauseIcon = document.getElementById('playPauseIcon');
    var isPlaying = true;
    function toggleAudio() {
        if (isPlaying) {
            audio.pause();
            playPauseIcon.innerHTML = '▶️';
        } else {
            audio.play();
            playPauseIcon.innerHTML = '⏸️';
        }
        isPlaying = !isPlaying;
    }
